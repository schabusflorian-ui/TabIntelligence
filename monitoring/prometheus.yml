global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  # TabIntelligence API — Prometheus metrics from /metrics endpoint
  - job_name: "tabintelligence-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "tabintelligence-api"

  # TabIntelligence database health — custom metrics from /health/db-metrics
  - job_name: "tabintelligence-db"
    metrics_path: /health/db-metrics
    scrape_interval: 30s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "tabintelligence-db"

  # Redis exporter (optional — add redis_exporter service if needed)
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]

  # PostgreSQL exporter (optional — add postgres_exporter service if needed)
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]
