name: CD

on:
  push:
    branches: [main]

# Cancel any in-progress deploy for the same ref so only the latest commit
# to main is ever being deployed.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ------------------------------------------------------------------
  # Gate: the CD workflow only proceeds once the CI workflow that runs
  # on the same commit has completed successfully.
  # ------------------------------------------------------------------
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow to succeed
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: Run Tests
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

  # ------------------------------------------------------------------
  # Build & push the `api` image
  # ------------------------------------------------------------------
  build-api:
    name: Build api image
    runs-on: ubuntu-latest
    needs: wait-for-ci
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for api image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/tabintelligence-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push api image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/tabintelligence-api:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/tabintelligence-api:buildcache,mode=max

  # ------------------------------------------------------------------
  # Build & push the `worker` image
  # ------------------------------------------------------------------
  build-worker:
    name: Build worker image
    runs-on: ubuntu-latest
    needs: wait-for-ci
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for worker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/tabintelligence-worker
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/tabintelligence-worker:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/tabintelligence-worker:buildcache,mode=max

  # ------------------------------------------------------------------
  # Deploy to staging (placeholder — replace with real infra tooling)
  # ------------------------------------------------------------------
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [build-api, build-worker]
    environment:
      name: staging
      url: https://staging.tabintelligence.example.com   # update to real URL

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # The short SHA produced by docker/metadata-action uses the first 7
      # characters of the full SHA, prefixed by "sha-".
      - name: Resolve image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "api_tag=${{ env.IMAGE_PREFIX }}/tabintelligence-api:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "worker_tag=${{ env.IMAGE_PREFIX }}/tabintelligence-worker:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------------
      # Replace the two echo steps below with your actual deploy command,
      # e.g.:
      #   - kubectl set image deployment/api  api=${{ steps.tags.outputs.api_tag }}
      #   - kubectl set image deployment/worker worker=${{ steps.tags.outputs.worker_tag }}
      # or a Helm upgrade, ECS task-definition update, etc.
      # ----------------------------------------------------------------
      - name: Deploy api to staging
        run: |
          echo "Deploying api image: ${{ steps.tags.outputs.api_tag }}"
          echo "Also tagged as:      ${{ env.IMAGE_PREFIX }}/tabintelligence-api:latest"

      - name: Deploy worker to staging
        run: |
          echo "Deploying worker image: ${{ steps.tags.outputs.worker_tag }}"
          echo "Also tagged as:         ${{ env.IMAGE_PREFIX }}/tabintelligence-worker:latest"
