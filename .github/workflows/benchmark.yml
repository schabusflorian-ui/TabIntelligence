name: Nightly Benchmark

on:
  schedule:
    # Run at 2:00 AM UTC daily
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      fixture:
        description: 'Run only this fixture (leave empty for all)'
        required: false
        type: string
      update_baselines:
        description: 'Update baselines after run'
        required: false
        type: boolean
        default: false

jobs:
  benchmark:
    name: Full Benchmark Run
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: emi
          POSTGRES_PASSWORD: emi_dev
          POSTGRES_DB: emi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run benchmark suite
        env:
          DATABASE_URL: postgresql://emi:emi_dev@localhost:5432/emi_test
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS="--fixture-dir tests/fixtures/ --save"
          if [ -n "${{ inputs.fixture }}" ]; then
            ARGS="tests/fixtures/${{ inputs.fixture }}.xlsx --expected tests/fixtures/${{ inputs.fixture }}_expected.json --save"
          fi
          python scripts/benchmark_extraction.py $ARGS

      - name: Run regression check
        run: python scripts/regression_tracker.py --results-dir data/benchmark_results/ --baselines-dir data/benchmark_baselines/

      - name: Update baselines
        if: ${{ inputs.update_baselines == true }}
        run: python scripts/regression_tracker.py --results-dir data/benchmark_results/ --baselines-dir data/benchmark_baselines/ --update-baselines

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: data/benchmark_results/
          retention-days: 30

      - name: Commit updated baselines
        if: ${{ inputs.update_baselines == true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/benchmark_baselines/
          git diff --staged --quiet || git commit -m "Update benchmark baselines [skip ci]"
          git push
