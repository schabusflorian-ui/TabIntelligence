repos:
  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict
      - id: mixed-line-ending

  # Ruff - Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Local custom hooks
  - repo: local
    hooks:
      - id: no-env-files
        name: Block .env files from commits
        entry: '\.env$'
        language: pygrep
        files: '^\.env.*$'
        exclude: '\.env\.example$'

      - id: no-api-keys
        name: Block API keys from commits
        entry: '(ANTHROPIC_API_KEY|sk-ant-)'
        language: pygrep
        exclude: '\.md$|\.example$|\.txt$'

      - id: pytest-smoke
        name: Run pytest smoke (fast unit tests only)
        entry: bash -c 'python -m pytest tests/unit/ -x -q --no-header --no-cov -m "not slow" --ignore=tests/load --ignore=tests/e2e 2>/dev/null || exit 1'
        language: system
        pass_filenames: false
        stages: [pre-push]
