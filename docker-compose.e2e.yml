# =============================================================================
# E2E Testing Overlay
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.e2e.yml up --build
#
# Adds app, worker, mock-claude, and init-db on top of the base infrastructure
# (postgres, redis, minio) defined in docker-compose.yml.
# =============================================================================

version: '3.8'

services:
  # --- Mock Claude API ---
  mock-claude:
    build:
      context: .
      dockerfile: Dockerfile
      target: mock-claude
    container_name: debtfund-mock-claude
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Database init + API key seed (one-shot) ---
  init-db:
    build:
      context: .
      dockerfile: Dockerfile
      target: init-db
    container_name: debtfund-init-db
    environment:
      DATABASE_URL: postgresql://emi:emi_dev@postgres:5432/emi
      ANTHROPIC_API_KEY: sk-ant-fake-key-for-e2e-testing
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: financial-models
      S3_VERIFY_SSL: "false"
      E2E_API_KEY: emi_e2e_test_key_for_integration_testing
    depends_on:
      postgres:
        condition: service_healthy

  # --- FastAPI app ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: debtfund-app
    ports:
      - "8100:8000"
    environment:
      DATABASE_URL: postgresql://emi:emi_dev@postgres:5432/emi
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: financial-models
      S3_VERIFY_SSL: "false"
      ANTHROPIC_API_KEY: sk-ant-fake-key-for-e2e-testing
      ANTHROPIC_BASE_URL: http://mock-claude:8080
      LOG_LEVEL: INFO
      DEBUG: "true"
    depends_on:
      init-db:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mock-claude:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  # --- Celery worker ---
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: debtfund-worker
    environment:
      DATABASE_URL: postgresql://emi:emi_dev@postgres:5432/emi
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: financial-models
      S3_VERIFY_SSL: "false"
      ANTHROPIC_API_KEY: sk-ant-fake-key-for-e2e-testing
      ANTHROPIC_BASE_URL: http://mock-claude:8080
      LOG_LEVEL: INFO
      DEBUG: "true"
    depends_on:
      init-db:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mock-claude:
        condition: service_healthy
